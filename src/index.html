<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GLITCH</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css?v=2" />
  <style>
    html {
      overflow-x: hidden;
    }

    :root {
      color-scheme: dark;
      font-family: "Courier New", ui-monospace, SFMono-Regular, Menlo, monospace;
      --bg: #00ff66;
      --fg: #041006;
      --panel: rgba(0, 0, 0, 0.18);
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--fg);
      transition: background 180ms linear, color 180ms linear;
      overflow-x: hidden;
    }

    body.happy {
      --bg: #00ff66;
      --fg: #031307;
    }

    body.cranky {
      --bg: #ff3333;
      --fg: #210000;
    }

    body.sad {
      --bg: #1a1a2e;
      --fg: #c6d4ff;
    }

    body.sleepy {
      --bg: #35284f;
      --fg: #ddd4ff;
    }

    body.glitch {
      --bg: #050000;
      --fg: #ff2a2a;
    }

    body.dancing {
      animation: demo-color-cycle 900ms steps(6, end) infinite;
    }

    body.dancing .face {
      animation: demo-face-bop 420ms steps(2, end) infinite;
      text-shadow: 0 0 10px currentColor, 0 0 28px currentColor, 4px 0 0 #ff00ff, -4px 0 0 #00ffff;
    }

    body.dancing h1,
    body.dancing #mood {
      animation: demo-text-pop 650ms steps(4, end) infinite;
    }

    @keyframes demo-color-cycle {
      0% { --bg: #000000; --fg: #00ff66; }
      16% { --bg: #14002b; --fg: #00e5ff; }
      32% { --bg: #260000; --fg: #ffff00; }
      48% { --bg: #001f1f; --fg: #ff00ff; }
      64% { --bg: #1f1f00; --fg: #ffffff; }
      80% { --bg: #000033; --fg: #ff6600; }
      100% { --bg: #000000; --fg: #00ff66; }
    }

    @keyframes demo-face-bop {
      from { transform: translateY(0) scale(1) rotate(-1deg); }
      to { transform: translateY(-0.18em) scale(1.06) rotate(1deg); }
    }

    @keyframes demo-text-pop {
      0% { letter-spacing: 0; }
      50% { letter-spacing: 0.18em; }
      100% { letter-spacing: 0; }
    }

    .controls-left {
      position: fixed;
      top: 1rem;
      left: 1rem;
      display: flex;
      gap: 0.75rem;
      z-index: 10;
    }

    .controls-right {
      position: fixed;
      top: 1rem;
      right: 1rem;
      display: flex;
      flex-direction: row-reverse;
      gap: 0.75rem;
      z-index: 10;
    }

    .mic-toggle,
    .music-toggle,
    .camera-toggle,
    .sponsor-toggle,
    .voice-toggle,
    .settings-toggle {
      width: 3.25rem;
      height: 3.25rem;
      display: grid;
      place-items: center;
      border-radius: 999px;
      border: 2px solid var(--fg);
      background: rgba(0, 0, 0, 0.72);
      color: #f7fff9;
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.18), 0 0 24px rgba(0, 0, 0, 0.45);
      font-size: 1.35rem;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: transform 180ms ease, background 180ms ease, color 180ms ease;
    }

    .mic-toggle:hover,
    .music-toggle:hover,
    .camera-toggle:hover,
    .sponsor-toggle:hover,
    .voice-toggle:hover,
    .settings-toggle:hover {
      transform: translateY(-1px) scale(1.04);
    }

    .mic-toggle.listening {
      background: #ff1744;
      color: #fff;
      animation: mic-pulse 900ms infinite alternate;
    }

    .music-toggle.music-on {
      background: #d500f9;
      color: #fff;
      border-color: #d500f9;
    }

    .camera-toggle.camera-on {
      background: #ffd600;
      color: #031307;
      border-color: #ffd600;
    }

    .voice-toggle.voice-on {
      background: #00e5ff;
      color: #031307;
      border-color: #00e5ff;
    }

    @keyframes mic-pulse {
      from {
        transform: scale(1);
        filter: brightness(1);
      }

      to {
        transform: scale(1.08);
        filter: brightness(1.35);
      }
    }

    main {
      width: min(960px, calc(100vw - 32px));
      text-align: center;
    }

    .face {
      font-size: clamp(4rem, 18vw, 13rem);
      line-height: 1;
      letter-spacing: -0.08em;
      text-shadow: 0 0 18px currentColor;
      margin-bottom: 1rem;
      cursor: crosshair;
      user-select: none;
      touch-action: manipulation;
    }

    .status,
    .log,
    form {
      background: var(--panel);
      border: 2px solid var(--fg);
      box-shadow: 8px 8px 0 var(--fg);
      padding: 1rem;
      margin-top: 1rem;
      text-align: left;
    }

    .bars {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .75rem;
    }

    .bar span {
      display: block;
      white-space: pre;
    }

    form {
      display: flex;
      gap: .75rem;
      align-items: center;
    }

    input {
      flex: 1;
      min-width: 0;
      font: inherit;
      padding: .75rem;
      border: 2px solid var(--fg);
      background: transparent;
      color: var(--fg);
    }

    button,
    select {
      font: inherit;
      padding: .75rem 1rem;
      border: 2px solid var(--fg);
      background: var(--fg);
      color: var(--bg);
      cursor: pointer;
      flex-shrink: 0;
    }

    select {
      flex: 1;
      background: transparent;
      color: var(--fg);
    }

    .log {
      min-height: 5rem;
      max-height: 12rem;
      overflow: auto;
    }

    /* Custom Scrollbar for Retro feel */
    .log::-webkit-scrollbar {
      width: 8px;
    }

    .log::-webkit-scrollbar-track {
      background: var(--panel);
      border-left: 2px solid var(--fg);
    }

    .log::-webkit-scrollbar-thumb {
      background: var(--fg);
    }

    /* Modal styles */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(6px);
      display: flex;
      place-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 200ms ease;
    }

    .modal.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      background: var(--bg);
      color: var(--fg);
      border: 3px solid var(--fg);
      box-shadow: 12px 12px 0 var(--fg);
      padding: 2rem;
      width: min(450px, calc(100vw - 32px));
      position: relative;
      transition: background 180ms linear, color 180ms linear;
    }

    .modal-close {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      font-size: 1.5rem;
      background: transparent;
      border: none;
      color: var(--fg);
      cursor: pointer;
      line-height: 1;
      padding: 0;
      width: 1.5rem;
      height: 1.5rem;
      display: grid;
      place-items: center;
    }

    .modal-close:hover {
      transform: scale(1.1);
    }

    .modal-content h2 {
      margin-top: 0;
      margin-bottom: 1.5rem;
      font-size: 1.5rem;
      letter-spacing: 0.05em;
      border-bottom: 2px solid var(--fg);
      padding-bottom: 0.5rem;
    }

    .settings-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .settings-group label {
      font-weight: bold;
      font-size: 0.9rem;
    }

    .settings-group select,
    .settings-group input {
      width: 100%;
      box-sizing: border-box;
      background: var(--panel);
      color: var(--fg);
      border: 2px solid var(--fg);
      padding: 0.75rem;
      font-family: inherit;
    }

    .pet-name {
      cursor: pointer;
      display: inline-block;
      transition: transform 180ms ease, opacity 180ms ease;
      user-select: none;
    }

    .pet-name:hover {
      transform: scale(1.05);
      opacity: 0.85;
    }

    @media (max-width: 600px) {
      body {
        justify-content: flex-start;
        padding-bottom: 2rem;
      }

      main {
        padding-top: 5.5rem;
      }

      .face {
        font-size: clamp(4.25rem, 20vw, 13rem);
      }

      .bars {
        grid-template-columns: 1fr;
        gap: 0.5rem;
      }

      .controls-left {
        top: 0.5rem;
        left: 0.5rem;
        gap: 0.35rem;
      }

      .controls-right {
        top: 0.5rem;
        right: 0.5rem;
        gap: 0.35rem;
      }

      .mic-toggle,
      .music-toggle,
      .camera-toggle,
      .sponsor-toggle,
      .voice-toggle,
      .settings-toggle {
        width: 3rem;
        height: 3rem;
        font-size: 1.25rem;
      }
    }

    @media (max-width: 350px) {
      .controls-left {
        left: 0.25rem;
        gap: 0.25rem;
      }

      .controls-right {
        right: 0.25rem;
        gap: 0.25rem;
      }

      .mic-toggle,
      .music-toggle,
      .camera-toggle,
      .sponsor-toggle,
      .voice-toggle,
      .settings-toggle {
        width: 2.75rem;
        height: 2.75rem;
        font-size: 1.1rem;
      }
    }
  </style>
</head>

<body class="happy">
  <div class="controls-left">
    <button id="micToggle" class="mic-toggle" type="button" aria-pressed="false" title="Toggle always-listening mic">
      <i class="fa-solid fa-microphone" aria-hidden="true"></i>
    </button>
    <button id="musicToggle" class="music-toggle" type="button" aria-pressed="false" title="Play background music">
      <i class="fa-solid fa-music" aria-hidden="true"></i>
    </button>
    <button id="cameraToggle" class="camera-toggle" type="button" aria-pressed="false" title="enable motion detection">
      <i class="fa-solid fa-video-slash" aria-hidden="true"></i>
    </button>
  </div>
  <audio id="bgMusic" src="/glitch.mp3?v=2" loop></audio>
  <div class="controls-right">
    <button id="voiceToggle" class="voice-toggle" type="button" aria-pressed="false" title="enable voice">
      <i class="fa-solid fa-volume-xmark" aria-hidden="true"></i>
    </button>
    <button id="settingsToggle" class="settings-toggle" type="button" title="Settings">
      <i class="fa-solid fa-gear" aria-hidden="true"></i>
    </button>
    <button id="sponsorToggle" class="sponsor-toggle" type="button" title="Sponsor us on GitHub">
      <i class="fa-brands fa-github" aria-hidden="true"></i>
    </button>
  </div>

  <div id="settingsModal" class="modal" aria-hidden="true">
    <div class="modal-content">
      <button class="modal-close" type="button" aria-label="Close settings">&times;</button>
      <h2>SETTINGS</h2>
      <div class="settings-group">
        <label for="nameInput">PET NAME:</label>
        <input id="nameInput" type="text" autocomplete="off" placeholder="Enter name..." />
      </div>
      <div class="settings-group">
        <label for="voiceSelect">GLITCH VOICE:</label>
        <select id="voiceSelect" aria-label="voice selection">
          <option>loading browser voices...</option>
        </select>
      </div>
      <div class="settings-group">
        <label for="idleChirpsToggle">IDLE CHIRPS:</label>
        <input id="idleChirpsToggle" type="checkbox" aria-label="enable idle droid chirps" />
      </div>
    </div>
  </div>

  <main data-face>
    <div id="face" class="face">[^._.^]</div>
    <h1 id="petName" class="pet-name" title="Click to randomize name">GLITCH</h1>
    <p id="mood">booting tiny resentment engine...</p>
    <section class="status">
      <div class="bars">
        <div class="bar">AFFECTION <span id="affection"></span></div>
        <div class="bar">ENERGY <span id="energy"></span></div>
        <div class="bar">HUNGER <span id="hunger"></span></div>
        <div class="bar">ATTENTION DEBT <span id="attention"></span></div>
      </div>
    </section>
    <form id="form">
      <input id="input" autocomplete="off" placeholder="feed GLITCH gossip, praise, snacks, or consequences" />
      <button>send</button>
    </form>
    <section id="log" class="log"></section>
  </main>
  <script>
    const face = document.querySelector('#face');
    const mood = document.querySelector('#mood');
    const log = document.querySelector('#log');
    const form = document.querySelector('#form');
    const input = document.querySelector('#input');
    const micToggle = document.querySelector('#micToggle');
    const voiceToggle = document.querySelector('#voiceToggle');
    const voiceSelect = document.querySelector('#voiceSelect');
    const idleChirpsToggle = document.querySelector('#idleChirpsToggle');
    const settingsToggle = document.querySelector('#settingsToggle');
    const settingsModal = document.querySelector('#settingsModal');
    const modalClose = document.querySelector('.modal-close');
    const petName = document.querySelector('#petName');
    const nameInput = document.querySelector('#nameInput');
    const musicToggle = document.querySelector('#musicToggle');
    const bgMusic = document.querySelector('#bgMusic');
    const cameraToggle = document.querySelector('#cameraToggle');
    const sponsorToggle = document.querySelector('#sponsorToggle');
    const RANDOM_NAMES = [
      "GLITCH", "GIZMO", "SPARK", "SCRAP", "RUSTY", "GREMLIN",
      "PEEVE", "WIDGET", "DONGLE", "MOGWAI", "GOBLIN", "SOCKET",
      "SOLDER", "CAPACITOR", "BYTE", "NIBBLE", "RESISTOR"
    ];
    let voiceEnabled = false;
    let musicEnabled = false;
    let idleChirpsEnabled = localStorage.getItem('glitchIdleChirpsEnabled') === 'true';
    let cameraEnabled = false;
    let isUserSpeaking = false;
    let isPetSpeaking = false;
    let audioUnlocked = false;
    let audioCtx = null;
    let userSpeechTimeout;

    let videoEl = null;
    let motionCanvas = null;
    let motionCtx = null;
    let previousFrame = null;
    let motionInterval = null;
    let motionReactionCooldown = false;
    const motionThreshold = 18;

    let idleTimer = null;
    let attentionProbeTimer = null;
    let danceTimer = null;
    let lastHumanActivityAt = Date.now();
    let lastNeglectAlarmAt = 0;
    const IDLE_PROBE_MIN_MS = 45000;
    const IDLE_PROBE_JITTER_MS = 30000;
    const NEGLECT_ALARM_COOLDOWN_MS = 300000;
    const IDLE_ANIMATIONS = [
      { name: 'blink', face: '[-._.-]', blip: () => playBlip(700, 0.18), duration: 700 },
      { name: 'wink-left', face: '[~._.-]', blip: () => playBlip(950, 0.14), duration: 600 },
      { name: 'wink-right', face: '[-._.~]', blip: () => playBlip(950, 0.14), duration: 600 },
      { name: 'look-left', face: '[<._.<]', blip: () => playBlip(850, 0.10), duration: 1000 },
      { name: 'look-right', face: '[>._.>]', blip: () => playBlip(850, 0.10), duration: 1000 },
      { name: 'blep', face: '[:P___]', blip: () => playBlip(300, 0.22), duration: 800 }
    ];

    const ensureAudioContext = () => {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        audioUnlocked = true;
        return audioCtx;
      } catch (err) {
        console.warn("AudioContext failed", err);
        return null;
      }
    };

    const playTone = ({ frequency = 800, endFrequency, duration = 0.15, wave = 'square', gain = 0.18, delay = 0, filter = true }) => {
      const ctx = ensureAudioContext();
      if (!ctx) return;
      try {
        const osc = ctx.createOscillator();
        const gainNode = ctx.createGain();
        const filterNode = ctx.createBiquadFilter();
        osc.type = wave;

        const now = ctx.currentTime + delay;
        osc.frequency.setValueAtTime(frequency, now);
        osc.frequency.exponentialRampToValueAtTime(Math.max(1, endFrequency || frequency), now + duration);

        filterNode.type = 'bandpass';
        filterNode.frequency.setValueAtTime(Math.max(120, frequency * 1.3), now);
        filterNode.Q.setValueAtTime(8, now);

        gainNode.gain.setValueAtTime(0.001, now);
        gainNode.gain.exponentialRampToValueAtTime(gain, now + 0.015);
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);

        osc.connect(filter ? filterNode : gainNode);
        if (filter) filterNode.connect(gainNode);
        gainNode.connect(ctx.destination);
        osc.start();
        osc.stop(now + duration);
      } catch (err) {
        console.warn("Droid tone failed", err);
      }
    };

    const playDroidCue = (cue) => {
      if (!cue?.sequence?.length) return;
      let delay = 0;
      const cueGain = cue.category === 'idle_mumble' ? 0.13 : cue.category === 'neglect_alarm' ? 0.30 : 0.24;
      for (const note of cue.sequence) {
        playTone({ ...note, gain: cueGain, delay });
        delay += (note.duration || 0.1) * 0.86;
      }
    };

    const playBlip = (frequency = 800, duration = 0.15, type = 'square') => {
      playDroidCue({
        category: 'touch_react',
        sequence: [{ frequency, endFrequency: frequency * 1.5, duration, wave: type }]
      });
    };

    const markHumanActivity = () => {
      lastHumanActivityAt = Date.now();
      scheduleNextIdle();
      scheduleNextAttentionProbe();
    };

    const DANCE_FACES = ['[^o^]', '[>o<]', '[^_^]', '[*o*]', '[>._.<]', '[v._.v]'];

    const startDemoDance = () => {
      document.body.classList.add('dancing');
      clearInterval(danceTimer);
      let frame = 0;
      danceTimer = setInterval(() => {
        if (!musicEnabled) return;
        showTransientFace(DANCE_FACES[frame % DANCE_FACES.length], 380);
        frame += 1;
      }, 420);
    };

    const stopDemoDance = () => {
      document.body.classList.remove('dancing');
      clearInterval(danceTimer);
      danceTimer = null;
      if (!faceReturnTimer) face.textContent = currentFace;
    };

    const updateMusicVolume = () => {
      if (!bgMusic) return;
      if (isUserSpeaking || isPetSpeaking) {
        bgMusic.volume = 0.15;
      } else {
        bgMusic.volume = 0.6;
      }
    };

    const setUserSpeaking = (speaking) => {
      isUserSpeaking = speaking;
      updateMusicVolume();
      clearTimeout(userSpeechTimeout);
      if (speaking) {
        userSpeechTimeout = setTimeout(() => {
          isUserSpeaking = false;
          updateMusicVolume();
        }, 5000);
      }
    };

    const computeMotion = (prevData, currData) => {
      let diffSum = 0;
      const len = currData.length;
      for (let i = 0; i < len; i += 4) {
        diffSum += Math.abs(currData[i] - prevData[i]);       // R
        diffSum += Math.abs(currData[i+1] - prevData[i+1]);   // G
        diffSum += Math.abs(currData[i+2] - prevData[i+2]);   // B
      }
      return (diffSum / ((len / 4) * 3));
    };

    const onMotionDetected = () => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'motion_detected' }));
      }
      if (!motionReactionCooldown) {
        addLog("SYSTEM: Motion detected!");
        playFaceInteraction('blink');
        motionReactionCooldown = true;
        setTimeout(() => { motionReactionCooldown = false; }, 2500);
      }
    };

    const setupMotionDetection = () => {
      motionCanvas = document.createElement('canvas');
      motionCanvas.width = 160;
      motionCanvas.height = 120;
      motionCtx = motionCanvas.getContext('2d');
      previousFrame = null;

      motionInterval = setInterval(() => {
        if (!videoEl || !videoEl.videoWidth) return;
        motionCtx.drawImage(videoEl, 0, 0, motionCanvas.width, motionCanvas.height);
        const currentFrame = motionCtx.getImageData(0, 0, motionCanvas.width, motionCanvas.height);
        if (previousFrame) {
          const motionLevel = computeMotion(previousFrame.data, currentFrame.data);
          if (motionLevel > motionThreshold) {
            onMotionDetected();
          }
        }
        previousFrame = currentFrame;
      }, 300);
    };

    const setPetName = (newName) => {
      const trimmed = newName.trim() || "GLITCH";
      petName.textContent = trimmed;
      nameInput.value = trimmed;
      input.placeholder = `feed ${trimmed} gossip, praise, snacks, or consequences`;
      localStorage.setItem('glitchName', trimmed);
    };
    let voices = [];
    let currentFace = face.textContent;
    let faceReturnTimer = null;

    const showTransientFace = (faceStr, duration) => {
      clearTimeout(faceReturnTimer);
      face.textContent = faceStr;
      faceReturnTimer = setTimeout(() => {
        faceReturnTimer = null;
        face.textContent = currentFace;
      }, duration);
    };

    const scheduleNextIdle = () => {
      clearTimeout(idleTimer);
      const delay = 4000 + Math.random() * 8000; // 4 to 12 seconds
      idleTimer = setTimeout(() => {
        const modalOpen = settingsModal.classList.contains('open');
        if (!modalOpen && !isPetSpeaking && !isUserSpeaking) {
          const anim = IDLE_ANIMATIONS[Math.floor(Math.random() * IDLE_ANIMATIONS.length)];
          if (audioUnlocked) anim.blip();
          showTransientFace(anim.face, anim.duration);
        }
        scheduleNextIdle();
      }, delay);
    };

    const canSendAttentionProbe = () => {
      const modalOpen = settingsModal.classList.contains('open');
      return idleChirpsEnabled
        && audioUnlocked
        && !modalOpen
        && !isPetSpeaking
        && !isUserSpeaking
        && document.visibilityState === 'visible'
        && ws?.readyState === WebSocket.OPEN;
    };

    const scheduleNextAttentionProbe = () => {
      clearTimeout(attentionProbeTimer);
      const delay = IDLE_PROBE_MIN_MS + Math.random() * IDLE_PROBE_JITTER_MS;
      attentionProbeTimer = setTimeout(() => {
        const idleSeconds = Math.floor((Date.now() - lastHumanActivityAt) / 1000);
        if (canSendAttentionProbe() && idleSeconds >= IDLE_PROBE_MIN_MS / 1000) {
          const now = Date.now();
          if (idleSeconds < 300 || now - lastNeglectAlarmAt > NEGLECT_ALARM_COOLDOWN_MS) {
            if (idleSeconds >= 300) lastNeglectAlarmAt = now;
            ws.send(JSON.stringify({ type: 'idle_probe', idle_seconds: idleSeconds }));
          }
        }
        scheduleNextAttentionProbe();
      }, delay);
    };

    input.addEventListener('input', () => {
      markHumanActivity();
    });

    scheduleNextIdle();
    let micEnabled = false;
    let recognition;
    let recognitionRestartTimer;
    const fields = {
      affection: document.querySelector('#affection'),
      energy: document.querySelector('#energy'),
      hunger: document.querySelector('#hunger'),
      attention_debt: document.querySelector('#attention'),
    };
    const bar = (n) => '█'.repeat(Math.round(n / 10)).padEnd(10, '░') + ` ${n}`;
    const addLog = (line) => { log.innerHTML += `<div>${line}</div>`; log.scrollTop = log.scrollHeight; };
    const sendUserText = (text) => {
      const clean = text.trim();
      if (!clean || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ type: 'user_text', text: clean }));
    };
    const isSpeechAvailable = () => 'speechSynthesis' in window && 'SpeechSynthesisUtterance' in window;
    const scoreVoice = (voice) => {
      const name = voice.name.toLowerCase();
      const lang = voice.lang.toLowerCase();
      let score = 0;
      if (lang.startsWith('en')) score += 10;
      if (lang.startsWith('ja') || name.includes('japanese')) score += 12;
      if (name.includes('microsoft')) score += 8;
      if (name.includes('natural')) score += 6;
      if (name.includes('aria') || name.includes('jenny') || name.includes('guy') || name.includes('nanami') || name.includes('female')) score += 3;
      if (name.includes('google')) score += 2;
      return score;
    };
    const loadVoices = () => {
      if (!isSpeechAvailable()) {
        voiceToggle.disabled = true;
        voiceToggle.title = 'Voice unavailable';
        voiceToggle.innerHTML = '<i class="fa-solid fa-volume-xmark" aria-hidden="true"></i>';
        voiceSelect.innerHTML = '<option>browser has no speechSynthesis</option>';
        return;
      }
      voices = speechSynthesis.getVoices().sort((a, b) => scoreVoice(b) - scoreVoice(a));
      voiceSelect.innerHTML = '';
      if (!voices.length) {
        voiceSelect.innerHTML = '<option>waiting for voices...</option>';
        return;
      }
      for (const voice of voices) {
        const option = document.createElement('option');
        option.value = voice.name;
        option.textContent = `${voice.name} (${voice.lang})`;
        voiceSelect.append(option);
      }
      const savedVoice = localStorage.getItem('glitchVoice');
      if (savedVoice && voices.some(v => v.name === savedVoice)) {
        voiceSelect.value = savedVoice;
      } else if (voices.length) {
        voiceSelect.value = voices[0].name;
      }
    };
    const speakGlitch = (msg) => {
      if (!voiceEnabled || !isSpeechAvailable()) return;
      const utterance = new SpeechSynthesisUtterance(msg.vocal_noise);
      const selected = voices.find((voice) => voice.name === voiceSelect.value);
      if (selected) utterance.voice = selected;
      utterance.pitch = msg.vocal_noise === 'grr-uwu' ? 0.65 : msg.vocal_noise === 'bzz-uwu' ? 1.35 : 1.0;
      utterance.rate = msg.vocal_noise === 'zz-uwu' ? 0.72 : msg.vocal_noise === 'bzz-uwu' ? 1.18 : 0.95;

      utterance.onstart = () => {
        isPetSpeaking = true;
        updateMusicVolume();
      };
      utterance.onend = () => {
        isPetSpeaking = false;
        updateMusicVolume();
      };
      utterance.onerror = () => {
        isPetSpeaking = false;
        updateMusicVolume();
      };

      speechSynthesis.cancel();
      isPetSpeaking = false;
      updateMusicVolume();

      speechSynthesis.speak(utterance);
    };
    // Hydrate settings
    const savedName = localStorage.getItem('glitchName');
    if (savedName) {
      setPetName(savedName);
    } else {
      const randomName = RANDOM_NAMES[Math.floor(Math.random() * RANDOM_NAMES.length)];
      setPetName(randomName);
    }

    const savedVoiceEnabled = localStorage.getItem('glitchVoiceEnabled');
    if (savedVoiceEnabled !== null) {
      voiceEnabled = savedVoiceEnabled === 'true';
      voiceToggle.classList.toggle('voice-on', voiceEnabled);
      voiceToggle.setAttribute('aria-pressed', voiceEnabled ? 'true' : 'false');
      voiceToggle.title = voiceEnabled ? 'disable voice' : 'enable voice';
      voiceToggle.innerHTML = voiceEnabled
        ? '<i class="fa-solid fa-volume-high" aria-hidden="true"></i>'
        : '<i class="fa-solid fa-volume-xmark" aria-hidden="true"></i>';
    }
    idleChirpsToggle.checked = idleChirpsEnabled;

    loadVoices();
    if (isSpeechAvailable()) speechSynthesis.addEventListener('voiceschanged', loadVoices);

    voiceToggle.addEventListener('click', () => {
      markHumanActivity();
      playBlip(1400, 0.08);
      voiceEnabled = !voiceEnabled;
      localStorage.setItem('glitchVoiceEnabled', voiceEnabled ? 'true' : 'false');
      voiceToggle.classList.toggle('voice-on', voiceEnabled);
      voiceToggle.setAttribute('aria-pressed', voiceEnabled ? 'true' : 'false');
      voiceToggle.title = voiceEnabled ? 'disable voice' : 'enable voice';
      voiceToggle.innerHTML = voiceEnabled
        ? '<i class="fa-solid fa-volume-high" aria-hidden="true"></i>'
        : '<i class="fa-solid fa-volume-xmark" aria-hidden="true"></i>';
      if (voiceEnabled && isSpeechAvailable()) {
        const chirp = new SpeechSynthesisUtterance('bzz-uwu');
        const selected = voices.find((voice) => voice.name === voiceSelect.value);
        if (selected) chirp.voice = selected;
        chirp.pitch = 1.35;
        chirp.rate = 1.1;
        speechSynthesis.speak(chirp);
      } else if (isSpeechAvailable()) {
        speechSynthesis.cancel();
      }
    });

    idleChirpsToggle.addEventListener('change', () => {
      ensureAudioContext();
      markHumanActivity();
      idleChirpsEnabled = idleChirpsToggle.checked;
      localStorage.setItem('glitchIdleChirpsEnabled', idleChirpsEnabled ? 'true' : 'false');
      if (idleChirpsEnabled) {
        playDroidCue({ category: 'idle_probe', sequence: [{ frequency: 620, endFrequency: 1240, duration: 0.18, wave: 'sine' }] });
      }
    });

    const setMusicPlaying = (shouldPlay, source = 'button') => {
      markHumanActivity();
      musicEnabled = shouldPlay;
      musicToggle.classList.toggle('music-on', musicEnabled);
      musicToggle.setAttribute('aria-pressed', musicEnabled ? 'true' : 'false');
      musicToggle.title = musicEnabled ? 'Mute background music' : 'Play background music';
      musicToggle.innerHTML = musicEnabled
        ? '<i class="fa-solid fa-compact-disc fa-spin" aria-hidden="true"></i>'
        : '<i class="fa-solid fa-music" aria-hidden="true"></i>';

      if (musicEnabled) {
        bgMusic.play().then(() => {
          startDemoDance();
          addLog(source === 'voice' ? 'VOICE: play music' : 'SYSTEM: music on');
        }).catch(err => {
          console.warn("Autoplay blocked or playback failed", err);
          musicEnabled = false;
          musicToggle.classList.remove('music-on');
          musicToggle.innerHTML = '<i class="fa-solid fa-music" aria-hidden="true"></i>';
          stopDemoDance();
          addLog('SYSTEM: music blocked by browser');
        });
      } else {
        bgMusic.pause();
        stopDemoDance();
        addLog(source === 'voice' ? 'VOICE: stop music' : 'SYSTEM: music off');
      }
    };

    const getPetCommandNames = () => {
      const displayName = (petName.textContent || '').toLowerCase();
      const savedName = (localStorage.getItem('glitchName') || '').toLowerCase();
      return [...new Set(['glitch', displayName, savedName].filter(Boolean))]
        .map(name => name.replace(/[^a-z0-9\s]/g, ' ').replace(/\s+/g, ' ').trim())
        .filter(Boolean);
    };

    const stripPetNameWakeWord = (text) => {
      let normalized = text.toLowerCase().replace(/[^a-z0-9\s]/g, ' ').replace(/\s+/g, ' ').trim();
      for (const name of getPetCommandNames().sort((a, b) => b.length - a.length)) {
        if (normalized === name) return '';
        if (normalized.startsWith(`${name} `)) return normalized.slice(name.length).trim();
        if (normalized.startsWith(`hey ${name} `)) return normalized.slice(name.length + 4).trim();
        if (normalized.startsWith(`ok ${name} `)) return normalized.slice(name.length + 3).trim();
        if (normalized.startsWith(`okay ${name} `)) return normalized.slice(name.length + 5).trim();
      }
      return normalized;
    };

    const handleLocalVoiceCommand = (spoken) => {
      // Named wake examples: "dongle play music", "hey glitch stop music".
      const text = stripPetNameWakeWord(spoken);
      if (!text) return false;

      const wantsStopCommand = /\b(stop|pause|mute|kill|quiet|enough)\b/.test(text)
        || /\b(turn off)\b/.test(text)
        || /\bdidn t say play music\b.*\b(stop|pause|mute|kill)\b/.test(text); // e.g. "stop dumbs", "I didn't say play music I said stop dumbs"
      const wantsMusicOn = /\b(play|start|resume)\b.*\b(music|song|tune|beat|audio)\b/.test(text)
        || /\b(music|song|tune|beat|audio)\b.*\b(on|start|play)\b/.test(text);
      const wantsMusicOff = /\b(stop|pause|mute|kill)\b.*\b(music|song|tune|beat|audio)\b/.test(text)
        || /\b(turn off)\b.*\b(music|song|tune|beat|audio)\b/.test(text)
        || /\b(music|song|tune|beat|audio)\b.*\b(off|stop|pause|mute)\b/.test(text)
        || (musicEnabled && wantsStopCommand);
      const wantsStopDance = /\b(stop|quit|end)\b.*\b(dance|boogie|party)\b/.test(text);
      const wantsDance = !wantsStopDance && /\b(dance|boogie|demo mode|party mode)\b/.test(text);

      if (wantsMusicOff || wantsStopDance) {
        setMusicPlaying(false, 'voice');
        playDroidCue({ category: 'turn_ack', sequence: [{ frequency: 880, endFrequency: 320, duration: 0.20, wave: 'sine' }] });
        chirp('weh-uwu', 0.9, 0.95);
        return true;
      }
      if (wantsMusicOn || wantsDance) {
        setMusicPlaying(true, 'voice');
        playDroidCue({ category: 'turn_ack', sequence: [{ frequency: 520, endFrequency: 1800, duration: 0.16, wave: 'square' }, { frequency: 1220, endFrequency: 740, duration: 0.12, wave: 'triangle' }] });
        chirp('bzz-uwu', 1.35, 1.18);
        return true;
      }
      return false;
    };

    musicToggle.addEventListener('click', () => {
      playBlip(1100, 0.08);
      setMusicPlaying(!musicEnabled, 'button');
    });

    cameraToggle.addEventListener('click', () => {
      markHumanActivity();
      playBlip(1000, 0.08);
      cameraEnabled = !cameraEnabled;
      cameraToggle.classList.toggle('camera-on', cameraEnabled);
      cameraToggle.setAttribute('aria-pressed', cameraEnabled ? 'true' : 'false');
      cameraToggle.title = cameraEnabled ? 'disable motion detection' : 'enable motion detection';
      cameraToggle.innerHTML = cameraEnabled
        ? '<i class="fa-solid fa-video" aria-hidden="true"></i>'
        : '<i class="fa-solid fa-video-slash" aria-hidden="true"></i>';

      if (cameraEnabled) {
        if (!videoEl) {
          videoEl = document.createElement('video');
          videoEl.autoplay = true;
          videoEl.playsInline = true;
          videoEl.style.display = 'none';
          document.body.appendChild(videoEl);
        }

        navigator.mediaDevices.getUserMedia({ video: true })
          .then(stream => {
            videoEl.srcObject = stream;
            setupMotionDetection();
            addLog("SYSTEM: Motion detection active");
          })
          .catch(err => {
            console.error("Camera access failed", err);
            addLog("SYSTEM: Camera blocked or unavailable");
            cameraEnabled = false;
            cameraToggle.classList.remove('camera-on');
            cameraToggle.innerHTML = '<i class="fa-solid fa-video-slash" aria-hidden="true"></i>';
          });
      } else {
        clearInterval(motionInterval);
        if (videoEl && videoEl.srcObject) {
          videoEl.srcObject.getTracks().forEach(track => track.stop());
          videoEl.srcObject = null;
        }
        addLog("SYSTEM: Motion detection disabled");
      }
    });

    sponsorToggle.addEventListener('click', () => {
      markHumanActivity();
      playBlip(1300, 0.08);
      window.open('https://github.com/sponsors/HappyMonkeyAI', '_blank');
    });

    voiceSelect.addEventListener('change', () => {
      markHumanActivity();
      localStorage.setItem('glitchVoice', voiceSelect.value);
    });

    petName.addEventListener('click', () => {
      markHumanActivity();
      playBlip(800, 0.15);
      const currentName = petName.textContent.trim().toUpperCase();
      const available = RANDOM_NAMES.filter(n => n !== currentName);
      const randomName = available[Math.floor(Math.random() * available.length)];
      setPetName(randomName);
      playFaceInteraction('kawaii');
    });

    nameInput.addEventListener('input', (e) => {
      markHumanActivity();
      setPetName(e.target.value);
    });

    // Settings modal listeners
    settingsToggle.addEventListener('click', () => {
      markHumanActivity();
      playBlip(1000, 0.08);
      const open = settingsModal.classList.toggle('open');
      settingsModal.setAttribute('aria-hidden', open ? 'false' : 'true');
    });

    modalClose.addEventListener('click', () => {
      markHumanActivity();
      playBlip(600, 0.10);
      settingsModal.classList.remove('open');
      settingsModal.setAttribute('aria-hidden', 'true');
    });

    settingsModal.addEventListener('click', (e) => {
      if (e.target === settingsModal) {
        markHumanActivity();
        playBlip(600, 0.10);
        settingsModal.classList.remove('open');
        settingsModal.setAttribute('aria-hidden', 'true');
      }
    });
    const transientFaceFor = {
      blink: { face: '[-._.-]', noise: 'pip-uwu', label: 'blink' },
      tongue: { face: '[:P___]', noise: 'blep-uwu', label: 'tongue poke' },
      kawaii: { face: '(｡♥‿♥｡)', noise: 'kyu-uwu', label: 'kawaii cheek squish' },
    };
    const interactionForPoint = (clientX, clientY) => {
      const rect = face.getBoundingClientRect();
      const x = (clientX - rect.left) / rect.width;
      const y = (clientY - rect.top) / rect.height;
      if (x < 0 || x > 1 || y < 0 || y > 1) return 'kawaii';
      const nearEyeRow = y >= 0.12 && y <= 0.46;
      const nearLeftEye = x >= 0.16 && x <= 0.38;
      const nearRightEye = x >= 0.62 && x <= 0.84;
      if (nearEyeRow && (nearLeftEye || nearRightEye)) return 'blink';
      if (x >= 0.34 && x <= 0.66 && y >= 0.42 && y <= 0.76) return 'tongue';
      return 'kawaii';
    };
    const chirp = (text, pitch = 1.2, rate = 1.1) => {
      if (!voiceEnabled || !isSpeechAvailable()) return;
      const utterance = new SpeechSynthesisUtterance(text);
      const selected = voices.find((voice) => voice.name === voiceSelect.value);
      if (selected) utterance.voice = selected;
      utterance.pitch = pitch;
      utterance.rate = rate;

      utterance.onstart = () => {
        isPetSpeaking = true;
        updateMusicVolume();
      };
      utterance.onend = () => {
        isPetSpeaking = false;
        updateMusicVolume();
      };
      utterance.onerror = () => {
        isPetSpeaking = false;
        updateMusicVolume();
      };

      speechSynthesis.cancel();
      isPetSpeaking = false;
      updateMusicVolume();

      speechSynthesis.speak(utterance);
    };
    const playFaceInteraction = (kind) => {
      const action = transientFaceFor[kind] || transientFaceFor.kawaii;
      addLog(`TOUCH: ${action.label}`);

      playBlip(kind === 'tongue' ? 250 : kind === 'blink' ? 600 : 900, kind === 'tongue' ? 0.22 : kind === 'blink' ? 0.18 : 0.20, 'square');
      chirp(action.noise, kind === 'tongue' ? 1.35 : 1.15, kind === 'blink' ? 1.35 : 1.05);
      showTransientFace(action.face, 750);
    };
    document.querySelector('main').addEventListener('pointerdown', (event) => {
      if (event.target.closest('form, .log')) return;
      markHumanActivity();
      playFaceInteraction(interactionForPoint(event.clientX, event.clientY));
    });
    const ws = new WebSocket(`${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws`);
    ws.onopen = () => scheduleNextAttentionProbe();
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const setMicUi = (label, listening = false) => {
      micToggle.title = label;
      micToggle.setAttribute('aria-label', label);
      micToggle.setAttribute('aria-pressed', listening ? 'true' : 'false');
      micToggle.classList.toggle('listening', listening);
      micToggle.innerHTML = listening
        ? '<i class="fa-solid fa-circle" aria-hidden="true"></i>'
        : '<i class="fa-solid fa-microphone" aria-hidden="true"></i>';
    };
    const startAlwaysListening = () => {
      if (!recognition || !micEnabled) return;
      try {
        recognition.start();
        setMicUi('Always listening — click to stop', true);
      } catch (error) {
        console.warn('[GLITCH] speech recognition start failed', error);
      }
    };
    const stopAlwaysListening = () => {
      micEnabled = false;
      clearTimeout(recognitionRestartTimer);
      try { recognition?.stop(); } catch (_) { /* ignore */ }
      setMicUi('Toggle always-listening mic', false);
    };
    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.lang = 'en-US';
      recognition.continuous = true;
      recognition.interimResults = false;
      recognition.onresult = (event) => {
        setUserSpeaking(true);
        const result = event.results[event.results.length - 1];
        if (!result?.isFinal) return;
        setUserSpeaking(false);
        const transcript = result[0].transcript.trim();
        markHumanActivity();
        addLog(`MIC: ${transcript}`);
        if (handleLocalVoiceCommand(transcript)) return;
        sendUserText(transcript);
      };
      recognition.onsoundstart = () => { setUserSpeaking(true); };
      recognition.onsoundend = () => { setUserSpeaking(false); };
      recognition.onspeechstart = () => { setUserSpeaking(true); };
      recognition.onspeechend = () => { setUserSpeaking(false); };

      recognition.onerror = (event) => {
        console.warn('[GLITCH] speech recognition error', event.error);
        addLog(`MIC: ${event.error}`);
        if (event.error === 'not-allowed' || event.error === 'service-not-allowed') {
          stopAlwaysListening();
          setMicUi('Microphone blocked in browser settings', false);
        }
      };
      recognition.onend = () => {
        if (!micEnabled) {
          setMicUi('Toggle always-listening mic', false);
          return;
        }
        recognitionRestartTimer = setTimeout(startAlwaysListening, 350);
      };
      micToggle.addEventListener('click', () => {
        markHumanActivity();
        playBlip(1200, 0.08);
        if (!window.isSecureContext) {
          addLog('MIC: requires HTTPS or localhost');
          return;
        }
        micEnabled = !micEnabled;
        if (micEnabled) startAlwaysListening(); else stopAlwaysListening();
      });
    } else {
      micToggle.disabled = true;
      setMicUi('Speech recognition unavailable in this browser', false);
    }
    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);
      if (msg.type === 'pet_update') {
        const s = msg.state;
        const wasDancing = document.body.classList.contains('dancing');
        document.body.className = s.background;
        document.body.classList.toggle('dancing', wasDancing);
        currentFace = s.face;
        if (!faceReturnTimer) {
          face.textContent = currentFace;
        }
        mood.textContent = `${s.mood.toUpperCase()} / neglect: ${s.neglect_stage}`;
        for (const [key, el] of Object.entries(fields)) el.textContent = bar(s[key]);
      }
      if (msg.type === 'response_text') {
        addLog(`GLITCH: <strong>${msg.vocal_noise}</strong> ${msg.text}`);
        speakGlitch(msg);
      }
      if (msg.type === 'sound_cue') {
        if (voiceEnabled || idleChirpsEnabled || musicEnabled) playDroidCue(msg.cue);
        if (msg.cue.category !== 'turn_ack') {
          addLog(`GLITCH: <strong>${msg.cue.vocal_text}</strong>`);
          if (voiceEnabled) chirp(msg.cue.vocal_text, msg.cue.category === 'neglect_alarm' ? 1.35 : 1.15, 1.25);
        }
      }
      if (msg.type === 'transcript') addLog(`YOU: ${msg.text}`);
    };
    form.addEventListener('submit', (event) => {
      event.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      markHumanActivity();
      if (handleLocalVoiceCommand(text)) {
        input.value = '';
        return;
      }
      sendUserText(text);
      input.value = '';
    });
  </script>
</body>

</html>
